        stroke-width="5" 
        stroke-linecap="round"
        stroke-linejoin="round" />
  
  <!-- Sigma Symbol - Bottom -->
  <path d="M30 65 L50 65 L35 75 L50 85 L30 85" 
        stroke="white" 
        stroke-width="5" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none" />
  
  <!-- Integration Symbol -->
  <path d="M62 65 Q 58 70, 58 75 T 62 85" 
        stroke="white" 
        stroke-width="4" 
        stroke-linecap="round"
        fill="none" />
  
  <!-- Accent Dots -->
  <circle cx="72" cy="70" r="2.5" fill="white" />
  <circle cx="72" cy="80" r="2.5" fill="white" />
