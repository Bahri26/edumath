name: Build and Release

on:
  push:
    branches: [ 'copilot/full-sync-20260307', 'main' ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release with dist.zip (true/false)'
        required: false
        default: 'false'
      release_tag:
        description: 'Tag name to use for the release (optional)'
        required: false

jobs:
  build:
    name: Build frontend and upload artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build --if-present

      - name: Package dist
        run: |
          rm -f dist.zip
          cd frontend
          if [ -d dist ]; then zip -r ../dist.zip dist; else echo "No dist directory"; fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist.zip

  release:
    name: Create GitHub release (optional)
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == 'True') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.sha }}
          name: ${{ github.event.inputs.release_tag || github.sha }}
          body: Automated build release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist.zip
          asset_name: dist.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
