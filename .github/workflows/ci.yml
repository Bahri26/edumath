name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high
        continue-on-error: true
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: A11y smoke (static landing)
        run: npx playwright test e2e/a11y-smoke.spec.js

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run smoke:predeploy
      - run: npm audit --audit-level=high
        continue-on-error: true

  ml-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  prod-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Production API smoke
        env:
          SMOKE_API_URL: https://edumath-t10n.onrender.com
          SMOKE_EXPECT_STORAGE: gdrive
        run: node scripts/tools/smokePreDeploy.js
        continue-on-error: true
