services:
  - type: web
    name: edumath-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: Edumath
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN_DAYS
        value: 30
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: AUTH_SLOW_LOG_MS
        value: 800
      - key: AUTH_DEBUG_TIMING
        value: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_COMPLEX_MODEL
        value: gemini-1.5-pro
      - key: AI_PROVIDER
        value: local
      # Kalıcı görsel: cloudinary (kolay) veya R2
      - key: STORAGE_PROVIDER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      # Python ML mikroservisi (edumath-ml)
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: edumath-ml
          property: host
      - key: ML_SERVICE_API_KEY
        fromService:
          type: web
          name: edumath-ml
          envVarKey: ML_SERVICE_API_KEY
      - key: ML_WEAK_TOPIC_THRESHOLD
        value: 0.55
      - key: ML_SERVICE_TIMEOUT_MS
        value: 15000

  - type: web
    name: edumath-ml
    runtime: python
    rootDir: ml-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ML_WEAK_TOPIC_THRESHOLD
        value: 0.55
      - key: ML_SERVICE_API_KEY
        generateValue: true

  - type: static
    name: edumath-web
    rootDir: frontend
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_ASSET_BASE_URL
        sync: false
        # Render: API servis kökü (örn. https://edumath-api.onrender.com) — /api olmadan
      - key: VITE_API_TIMEOUT_MS
        value: 15000
      - key: VITE_AUTH_TIMEOUT_MS
        value: 60000
      - key: VITE_AI_TIMEOUT_MS
        value: 45000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html