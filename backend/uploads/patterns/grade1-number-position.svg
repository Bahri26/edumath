<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Birinci sinif siraya gore sayi bulma</title>
  <desc id="desc">Tek ve cift siralarda farkli sayilarin yer aldigi oruntu gorseli.</desc>
  <rect width="900" height="520" fill="#f5f3ff"/>
  <rect x="40" y="40" width="820" height="440" rx="32" fill="#ede9fe" stroke="#8b5cf6" stroke-width="6"/>
  <text x="78" y="110" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#5b21b6">Tek ve cift siralari takip et</text>
  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <g>
      <circle cx="150" cy="238" r="52" fill="#8b5cf6"/>
      <text x="150" y="252" font-size="38" font-weight="700" fill="#ffffff">1.</text>
      <text x="150" y="326" font-size="34" font-weight="700" fill="#5b21b6">5</text>
    </g>
    <g>
      <circle cx="290" cy="238" r="52" fill="#c4b5fd"/>
      <text x="290" y="252" font-size="38" font-weight="700" fill="#4c1d95">2.</text>
      <text x="290" y="326" font-size="34" font-weight="700" fill="#4c1d95">9</text>
    </g>
    <g>
      <circle cx="430" cy="238" r="52" fill="#8b5cf6"/>
      <text x="430" y="252" font-size="38" font-weight="700" fill="#ffffff">3.</text>
      <text x="430" y="326" font-size="34" font-weight="700" fill="#5b21b6">5</text>
    </g>
    <g>
      <circle cx="570" cy="238" r="52" fill="#c4b5fd"/>
      <text x="570" y="252" font-size="38" font-weight="700" fill="#4c1d95">4.</text>
      <text x="570" y="326" font-size="34" font-weight="700" fill="#4c1d95">9</text>
    </g>
    <g>
      <circle cx="740" cy="238" r="60" fill="#ddd6fe" stroke="#6d28d9" stroke-width="4" stroke-dasharray="10 10"/>
      <text x="740" y="250" font-size="34" font-weight="700" fill="#5b21b6">11.</text>
      <text x="740" y="326" font-size="38" font-weight="700" fill="#5b21b6">?</text>
    </g>
  </g>
  <text x="78" y="388" font-family="Verdana, sans-serif" font-size="28" fill="#5b21b6">Tek sira birinci sayiyi, cift sira ikinci sayiyi gosterir.</text>
</svg>