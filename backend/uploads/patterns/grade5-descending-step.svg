<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Besinci sinif azalan bes farkli oruntu</title>
  <desc id="desc">Her adimda bes azalan merdiven tipinde bir sayi oruntusu gorseli.</desc>
  <rect width="900" height="520" fill="#fefce8"/>
  <rect x="36" y="36" width="828" height="448" rx="34" fill="#fef3c7" stroke="#ca8a04" stroke-width="6"/>
  <text x="72" y="102" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#a16207">Her adimda -5 azalir</text>
  <g>
    <rect x="84" y="170" width="126" height="164" rx="22" fill="#fde68a"/>
    <rect x="248" y="194" width="126" height="140" rx="22" fill="#fcd34d"/>
    <rect x="412" y="218" width="126" height="116" rx="22" fill="#fbbf24"/>
    <rect x="576" y="242" width="126" height="92" rx="22" fill="#f59e0b"/>
    <rect x="740" y="266" width="96" height="68" rx="22" fill="#fef3c7" stroke="#a16207" stroke-width="4" stroke-dasharray="10 10"/>
  </g>
  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <text x="147" y="262" font-size="40" font-weight="700" fill="#78350f">60</text>
    <text x="311" y="274" font-size="40" font-weight="700" fill="#78350f">55</text>
    <text x="475" y="286" font-size="40" font-weight="700" fill="#ffffff">50</text>
    <text x="639" y="298" font-size="40" font-weight="700" fill="#ffffff">45</text>
    <text x="788" y="308" font-size="34" font-weight="700" fill="#92400e">?</text>
  </g>
  <g font-family="Verdana, sans-serif" font-size="24" font-weight="700" fill="#a16207" text-anchor="middle">
    <text x="228" y="198">-5</text>
    <text x="392" y="222">-5</text>
    <text x="556" y="246">-5</text>
    <text x="720" y="270">-5</text>
  </g>
  <text x="72" y="388" font-family="Verdana, sans-serif" font-size="28" fill="#92400e">Azalan basamaklar, sabit farkla geriye giden oruntuyu gosterir.</text>
</svg>