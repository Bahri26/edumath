  <rect x="36" y="36" width="828" height="448" rx="34" fill="#dbeafe" stroke="#2563eb" stroke-width="6"/>
  <text x="72" y="102" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#1d4ed8">Her adimda +5 ilerler</text>
  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <g>
      <polygon points="140,178 210,218 210,298 140,338 70,298 70,218" fill="#93c5fd"/>
      <text x="140" y="266" font-size="40" font-weight="700" fill="#1e3a8a">4</text>
