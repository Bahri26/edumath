<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Besinci sinif sabit bes artisli oruntu</title>
  <desc id="desc">Her adimda bes artan terimlerle kurulan sayi oruntusu gorseli.</desc>
