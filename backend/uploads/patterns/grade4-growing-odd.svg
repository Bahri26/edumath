<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Dorduncu sinif tek sayi farklariyla buyuyen oruntu</title>
  <desc id="desc">Artislar 3, 5, 7, 9 seklinde buyuyen sayi oruntusu gorseli.</desc>
  <rect width="900" height="520" fill="#f5f3ff"/>
  <rect x="36" y="36" width="828" height="448" rx="34" fill="#ede9fe" stroke="#7c3aed" stroke-width="6"/>
  <text x="72" y="102" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#5b21b6">Artislar buyuyor: +3, +5, +7, +9</text>
  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <g>
      <rect x="78" y="180" width="118" height="98" rx="24" fill="#c4b5fd"/>
      <text x="137" y="238" font-size="42" font-weight="700" fill="#4c1d95">2</text>
    </g>
    <g>
      <rect x="228" y="168" width="118" height="110" rx="24" fill="#a78bfa"/>
      <text x="287" y="236" font-size="42" font-weight="700" fill="#ffffff">5</text>
    </g>
    <g>
      <rect x="378" y="148" width="118" height="130" rx="24" fill="#8b5cf6"/>
      <text x="437" y="230" font-size="42" font-weight="700" fill="#ffffff">10</text>
    </g>
    <g>
      <rect x="528" y="120" width="118" height="158" rx="24" fill="#7c3aed"/>
      <text x="587" y="220" font-size="42" font-weight="700" fill="#ffffff">17</text>
    </g>
    <g>
      <rect x="678" y="84" width="118" height="194" rx="24" fill="#ddd6fe" stroke="#6d28d9" stroke-width="4" stroke-dasharray="10 10"/>
      <text x="737" y="194" font-size="40" font-weight="700" fill="#5b21b6">?</text>
    </g>
  </g>
  <g font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#5b21b6" text-anchor="middle">
    <text x="212" y="214">+3</text>
    <text x="362" y="202">+5</text>
    <text x="512" y="184">+7</text>
    <text x="662" y="160">+9</text>
  </g>
  <text x="72" y="366" font-family="Verdana, sans-serif" font-size="28" fill="#5b21b6">Kural: artis miktari her adimda 2 buyur.</text>
  <text x="72" y="412" font-family="Verdana, sans-serif" font-size="24" fill="#6d28d9">Bu gorsel, sabit olmayan ama duzenli buyuyen farklari gosterir.</text>
</svg>