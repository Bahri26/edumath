<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Birinci sinif sirali sayi oruntusu</title>
  <desc id="desc">Iki sayinin sira ile tekrar ettigi basit sayi oruntusu gorseli.</desc>
  <rect width="900" height="520" fill="#f8fafc"/>
  <rect x="40" y="40" width="820" height="440" rx="32" fill="#eff6ff" stroke="#93c5fd" stroke-width="6"/>
  <text x="78" y="110" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#1e3a8a">Sayi oruntusu: sayilar sira ile tekrar eder</text>
  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <circle cx="170" cy="240" r="62" fill="#2563eb"/>
    <text x="170" y="256" font-size="46" font-weight="700" fill="#ffffff">1</text>
    <circle cx="320" cy="240" r="62" fill="#60a5fa"/>
    <text x="320" y="256" font-size="46" font-weight="700" fill="#0f172a">3</text>
    <circle cx="470" cy="240" r="62" fill="#2563eb"/>
    <text x="470" y="256" font-size="46" font-weight="700" fill="#ffffff">1</text>
    <circle cx="620" cy="240" r="62" fill="#60a5fa"/>
    <text x="620" y="256" font-size="46" font-weight="700" fill="#0f172a">3</text>
    <circle cx="770" cy="240" r="62" fill="#dbeafe" stroke="#2563eb" stroke-width="4" stroke-dasharray="10 10"/>
    <text x="770" y="256" font-size="46" font-weight="700" fill="#1e3a8a">?</text>
  </g>
  <text x="78" y="388" font-family="Verdana, sans-serif" font-size="28" fill="#334155">Kural: 1, 3, 1, 3... ya da 2, 4, 2, 4... gibi sayilar donusur.</text>
</svg>